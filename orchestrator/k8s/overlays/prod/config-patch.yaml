apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<YOUR_AWS_ACCOUNT_ID>:role/orchestrator-role
spec:
  replicas: 2
  template:
    metadata:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::<YOUR_AWS_ACCOUNT_ID>:role/orchestrator-role
    spec:
      containers:
      - name: orchestrator
        env:
        - name: AWS_REGION
          value: "<YOUR_AWS_REGION>"
        - name: APP_ENV
          value: "prod"
        - name: CONFIG_PROVIDER
          value: "aws"
        - name: AWS_PARAM_PREFIX
          value: "turbocat"
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "400m"
            memory: "512Mi"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orchestrator
  annotations:
    alb.ingress.kubernetes.io/group.name: "shared-alb"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:<YOUR_AWS_REGION>:<YOUR_AWS_ACCOUNT_ID>:certificate/<YOUR_CERT_ID>"
    alb.ingress.kubernetes.io/subnets: "<YOUR_PUBLIC_SUBNET_1>, <YOUR_PUBLIC_SUBNET_2>"
    alb.ingress.kubernetes.io/tags: "Environment=production"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-path: "/health"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/ssl-policy: "ELBSecurityPolicy-2016-08"
spec:
  rules:
  - host: orchestrator-api.<YOUR_DOMAIN>
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ssl-redirect
            port:
              name: use-annotation
      - path: /
        pathType: Prefix
        backend:
          service:
            name: orchestrator
            port:
              number: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<YOUR_AWS_ACCOUNT_ID>:role/orchestrator-role
